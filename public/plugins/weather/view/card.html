<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天气</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: transparent;
      color: #1f2937;
    }
    .card {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(14, 165, 233, 0.08));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #1e40af;
    }
    .city {
      font-weight: 600;
    }
    .temp {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
    }
    .meta {
      font-size: 12px;
      color: #475569;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #64748b;
    }
    .more {
      border: none;
      background: #e0f2fe;
      color: #0284c7;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="city" id="city">--</span>
      <span id="weather">--</span>
    </div>
    <div class="temp" id="temp">--</div>
    <div class="meta">
      <span id="range">--</span>
      <span id="wind">--</span>
      <span id="humidity">--</span>
    </div>
    <div class="footer">
      <span id="time">--</span>
      <button class="more" id="openWindow">详情</button>
    </div>
  </div>

  <script src="/static/js/card.js"></script>
  <script>
const DEFAULT_CITY = { id: '101010100', name: '??' }

    function getSavedCity () {
      try {
        const saved = JSON.parse(localStorage.getItem('weather_city') || '')
        if (saved && saved.id) return saved
      } catch (e) {}
      return null
    }

    async function searchCityByName (name) {
      if (!name) return []
      try {
        const res = await fetch(`/plugins/weather/api/search?city=${encodeURIComponent(name)}`)
        const json = await res.json()
        return json.code === 1 ? (json.data || []) : []
      } catch (e) {
        return []
      }
    }

    async function detectCity () {
      try {
        const res = await fetch('/apps.weather.Index/ip')
        const json = await res.json()
        const data = json && json.data ? json.data : {}
        const candidates = []
        if (data.cityName) candidates.push(data.cityName)
        if (data.regionName && data.regionName !== data.cityName) candidates.push(data.regionName)
        for (const name of candidates) {
          const list = await searchCityByName(name)
          if (list.length) {
            const city = { id: String(list[0].id), name: String(list[0].name) }
            localStorage.setItem('weather_city', JSON.stringify(city))
            return city
          }
        }
      } catch (e) {}
      return null
    }

    async function resolveCity () {
      const saved = getSavedCity()
      if (saved && !(saved.id === DEFAULT_CITY.id && saved.name === DEFAULT_CITY.name)) {
        return saved
      }
      const detected = await detectCity()
      return detected || saved || DEFAULT_CITY
    }

    async function loadWeather () {
      const city = await resolveCity()
      document.getElementById('city').textContent = city.name || '--'

      try {
        const [nowRes, forecastRes] = await Promise.all([
          fetch(`/plugins/weather/api/now?cityId=${encodeURIComponent(city.id)}`),
          fetch(`/plugins/weather/api/forecast?cityId=${encodeURIComponent(city.id)}`)
        ])
        const nowJson = await nowRes.json()
        const forecastJson = await forecastRes.json()

        const now = nowJson.code === 1 ? nowJson.data : {}
        const forecast = forecastJson.code === 1 ? forecastJson.data : {}

        document.getElementById('city').textContent = now.city || forecast.city || city.name
        document.getElementById('temp').textContent = now.temp ? `${now.temp}?` : '--'
        document.getElementById('weather').textContent = now.weather || forecast.weather || '--'
        document.getElementById('range').textContent = forecast.temp1 && forecast.temp2 ? `${forecast.temp2} / ${forecast.temp1}` : '--'
        document.getElementById('wind').textContent = now.wind ? `?? ${now.wind}` : '--'
        document.getElementById('humidity').textContent = now.humidity ? `?? ${now.humidity}` : '--'
        document.getElementById('time').textContent = now.time || forecast.ptime || ''
      } catch (e) {
        document.getElementById('temp').textContent = '--'
      }
    }

    document.getElementById('openWindow').addEventListener('click', () => {
      if (typeof openCard === 'function') {
        openCard({
          name: '??',
          src: '/plugins/weather/static/ico.png',
          url: '/plugins/weather/view/window.html'
        })
      } else {
        window.location.href = '/plugins/weather/view/window.html'
      }
    })

    loadWeather()
</script>
</body>
</html>
