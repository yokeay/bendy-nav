<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天气详情</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
    }
    .search {
      margin-left: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px 12px;
      min-width: 220px;
      font-size: 14px;
    }
    .btn {
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .metric {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .metric .label {
      font-size: 12px;
      color: #64748b;
    }
    .metric .value {
      font-size: 18px;
      font-weight: 600;
    }
    .result {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result button {
      text-align: left;
      border: 1px solid #e2e8f0;
      background: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .hint {
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="header">
        <div class="title" id="city">--</div>
        <div class="search">
          <input type="text" id="cityInput" placeholder="输入城市名，如 北京" />
          <button class="btn" id="searchBtn">搜索</button>
        </div>
      </div>
      <div class="grid">
        <div class="metric">
          <div class="label">当前温度</div>
          <div class="value" id="temp">--</div>
        </div>
        <div class="metric">
          <div class="label">天气情况</div>
          <div class="value" id="weather">--</div>
        </div>
        <div class="metric">
          <div class="label">温度范围</div>
          <div class="value" id="range">--</div>
        </div>
        <div class="metric">
          <div class="label">风力风向</div>
          <div class="value" id="wind">--</div>
        </div>
        <div class="metric">
          <div class="label">湿度</div>
          <div class="value" id="humidity">--</div>
        </div>
        <div class="metric">
          <div class="label">更新时间</div>
          <div class="value" id="time">--</div>
        </div>
      </div>
      <div class="hint" id="status"></div>
    </div>

    <div class="panel">
      <div class="title" style="font-size:16px;">城市搜索结果</div>
      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    const DEFAULT_CITY = { id: '101010100', name: '北京' }

    function getCity () {
      try {
        const saved = JSON.parse(localStorage.getItem('weather_city') || '')
        if (saved && saved.id) return saved
      } catch (e) {}
      return DEFAULT_CITY
    }

    function setCity (city) {
      localStorage.setItem('weather_city', JSON.stringify(city))
      loadWeather()
    }

    async function loadWeather () {
      const city = getCity()
      document.getElementById('city').textContent = city.name || '--'
      document.getElementById('status').textContent = '加载中...'
      try {
        const [nowRes, forecastRes] = await Promise.all([
          fetch(`/plugins/weather/api/now?cityId=${encodeURIComponent(city.id)}`),
          fetch(`/plugins/weather/api/forecast?cityId=${encodeURIComponent(city.id)}`)
        ])
        const nowJson = await nowRes.json()
        const forecastJson = await forecastRes.json()
        const now = nowJson.code === 1 ? nowJson.data : {}
        const forecast = forecastJson.code === 1 ? forecastJson.data : {}

        document.getElementById('city').textContent = now.city || forecast.city || city.name
        document.getElementById('temp').textContent = now.temp ? `${now.temp}℃` : '--'
        document.getElementById('weather').textContent = now.weather || forecast.weather || '--'
        document.getElementById('range').textContent = forecast.temp1 && forecast.temp2 ? `${forecast.temp2} / ${forecast.temp1}` : '--'
        document.getElementById('wind').textContent = now.wind || '--'
        document.getElementById('humidity').textContent = now.humidity || '--'
        document.getElementById('time').textContent = now.time || forecast.ptime || '--'
        document.getElementById('status').textContent = ''
      } catch (e) {
        document.getElementById('status').textContent = '加载失败，请稍后重试'
      }
    }

    async function searchCity () {
      const keyword = document.getElementById('cityInput').value.trim()
      if (!keyword) return
      const resultEl = document.getElementById('result')
      resultEl.innerHTML = '搜索中...'
      try {
        const res = await fetch(`/plugins/weather/api/search?city=${encodeURIComponent(keyword)}`)
        const json = await res.json()
        const list = json.code === 1 ? (json.data || []) : []
        resultEl.innerHTML = ''
        if (!list.length) {
          resultEl.textContent = '没有匹配结果'
          return
        }
        list.slice(0, 10).forEach(item => {
          const btn = document.createElement('button')
          btn.textContent = `${item.name} (${item.id})`
          btn.addEventListener('click', () => setCity(item))
          resultEl.appendChild(btn)
        })
      } catch (e) {
        resultEl.textContent = '搜索失败'
      }
    }

    document.getElementById('searchBtn').addEventListener('click', searchCity)
    document.getElementById('cityInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchCity()
    })

    loadWeather()
  </script>
</body>
</html>
